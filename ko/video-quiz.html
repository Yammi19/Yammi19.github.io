<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Video Quiz - 공부를하자</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Inter', 'Noto Sans KR', sans-serif;
      background: #f9f9fc;
      color: #333;
      line-height: 1.6;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 30px;
    }

    nav {
      position: fixed;
      top: 0;
      width: 100%;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(192, 132, 252, 0.15);
      z-index: 1000;
      padding: 18px 0;
    }
    .nav-container {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .logo {
      font-size: 1.8rem;
      font-weight: 700;
      color: #c084fc;
      text-decoration: none;
    }
    .nav-links {
      display: flex;
      gap: 40px;
    }
    .nav-links a {
      color: #4b2e5a;
      text-decoration: none;
      font-weight: 500;
      transition: color 0.3s;
    }
    .nav-links a:hover, .nav-links a.active {
      color: #c084fc;
    }

    main {
      padding: 100px 0 80px;
      min-height: 100vh;
    }

    .page-header {
      background: linear-gradient(135deg, #2d1f4e 0%, #1a1625 100%);
      padding: 60px 0;
      text-align: center;
    }
    .page-header h1 {
      font-size: 4.8rem;
      color:#583475;
      margin-bottom: 10px;
    }
    .page-header p {
      color: rgba(255,255,255,0.7);
      font-size: 1.1rem;
    }

    .content {
      max-width: 800px;
      margin: 0 auto;
      padding: 40px 30px;
    }

    .video-wrapper {
      position: relative;
      width: 100%;
      aspect-ratio: 16/9;
      background: #000;
      border-radius: 16px;
      overflow: hidden;
      margin-bottom: 30px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    }
    .video-wrapper iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    .quiz-section {
      background: white;
      border-radius: 16px;
      padding: 30px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }
    .quiz-section h2 {
      font-size: 1.8rem;
      color: #4b2e5a;
      margin-bottom: 20px;
    }

    .quiz-item {
      margin-bottom: 25px;
      padding-bottom: 25px;
      border-bottom: 1px solid #eee;
    }
    .quiz-item:last-child {
      border-bottom: none;
      margin-bottom: 0;
      padding-bottom: 0;
    }
    .quiz-question {
      font-size: 1.1rem;
      font-weight: 600;
      color: #333;
      margin-bottom: 15px;
    }
    .quiz-options {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .quiz-option {
      background: #f9f9fc;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      padding: 12px 15px;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.2s;
      text-align: left;
    }
    .quiz-option:hover {
      border-color: #c084fc;
      background: rgba(192, 132, 252, 0.1);
    }
    .quiz-option.selected {
      border-color: #c084fc;
      background: rgba(192, 132, 252, 0.2);
    }
    .quiz-option.correct {
      border-color: #22c55e;
      background: rgba(34, 197, 94, 0.2);
    }
    .quiz-option.wrong {
      border-color: #ef4444;
      background: rgba(239, 68, 68, 0.2);
    }

    .submit-btn {
      background: linear-gradient(135deg, #c084fc, #a855f7);
      color: white;
      border: none;
      padding: 15px 40px;
      font-size: 1.1rem;
      font-weight: 600;
      border-radius: 30px;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 20px;
    }
    .submit-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(192, 132, 252, 0.4);
    }

    .score-display {
      background: rgba(192, 132, 252, 0.2);
      padding: 10px 24px;
      border-radius: 30px;
      font-weight: 600;
      color: #c084fc;
    }

    .result-box {
      margin-top: 20px;
      padding: 20px;
      border-radius: 12px;
      text-align: center;
      display: none;
    }
    .result-box.show {
      display: block;
    }
    .result-box.success {
      background: rgba(34, 197, 94, 0.2);
      color: #22c55e;
    }
    .result-box.fail {
      background: rgba(239, 68, 68, 0.2);
      color: #ef4444;
    }

    @media (max-width: 768px) {
      .nav-links { gap: 24px; font-size: 0.95rem; }
      .page-header h1 { font-size: 2rem; }
    }

    .bgimg {
  background-image:linear-gradient(rgba(255, 255, 255, 0.5), rgba(255, 255, 255, 0.5)), /* 白色，50%透明度 */
    url("https://live.staticflickr.com/3385/3413407724_b65cc330a0_b.jpg");
  width: 100%;
}

    .subtitle {
      font-size: 2rem;
      color: #6b21a8;
      margin-bottom: 50px;
      max-width: 900px;
      margin-left: auto;
      margin-right: auto;
    }
  </style>
</head>
<body>

  <nav>
    <div class="container nav-container">
      <a href="index.html" class="logo">공부하자 💕</a>
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="vocab.html">Vocabulary</a>
        <a href="Chatbot.html">Chatbot</a>
        <a href="video-quiz.html" class="active">Video Quiz</a>
        <a href="Resource.html">Resources</a>
        <a href="stats.html">Statistics</a>
        <a href="Contact.html">Contact</a>
      </div>
    </div>
  </nav>

  <main>
    <div class="page-header bgimg">
      <div class="container">
        <h1>🎬 影片問答挑戰</h1>
        <p class="subtitle ">一邊睇片一邊學韓文</p>
      </div>
    </div>

    <div class="content">
      <div class="video-wrapper">
        <iframe id="videoFrame" src="https://www.youtube.com/embed/JLHTv-R3pEI?enablejsapi=1" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
      </div>

      <div class="quiz-section">
        <h2>📝 問題</h2>
        <div id="quizContainer"></div>
        <button class="submit-btn" id="submitBtn" onclick="checkAllAnswers()">Submit 提交</button>
        <button class="submit-btn" id="retryBtn" onclick="resetQuiz()" style="display:none; background: linear-gradient(135deg, #6b7280, #4b5563);">Try Again 再試一次</button>
        <div class="result-box" id="resultBox"></div>
      </div>
    </div>
  </main>

  <script src="https://www.youtube.com/iframe_api"></script>
  <script>
    const quizzes = [
      { question: "佢哋坐咗係邊?", options: ["밥테이블 (飯枱)", "소파 (梳化)", "침대 (床)", "의자 (椅子)"], correct: 0 },
      { question: "佢哋食緊邊個國家嘅料理？", options: ["한국 (韓國)", "중국 (中國)", "일본 (日本)", "베트남 (越南)"], correct: 0 },
      { question: "男主角想要咩?", options: ["음식 (食物)", "물 (水)", "돈 (錢)", "휴대폰 (電話)"], correct: 1 },
      { question: "呢個情況係咩場面?", options: ["식사 중 (食飯)", "운동 중 (運動)", "숙제 중 (做功課)", "게임 중 (打遊戲)"], correct: 0 }
    ];

    let selectedAnswers = {};

    function initQuiz() {
      const container = document.getElementById('quizContainer');
      quizzes.forEach((quiz, index) => {
        const item = document.createElement('div');
        item.className = 'quiz-item';
        item.innerHTML = `
          <div class="quiz-question">${index + 1}. ${quiz.question}</div>
          <div class="quiz-options">
            ${quiz.options.map((opt, optIndex) => `
              <button class="quiz-option" onclick="selectAnswer(${index}, ${optIndex})">${opt}</button>
            `).join('')}
          </div>
        `;
        container.appendChild(item);
      });
    }

    function selectAnswer(quizIndex, optionIndex) {
      selectedAnswers[quizIndex] = optionIndex;
      const options = document.querySelectorAll('.quiz-item')[quizIndex].querySelectorAll('.quiz-option');
      options.forEach((opt, i) => {
        opt.classList.remove('selected');
        if (i === optionIndex) {
          opt.classList.add('selected');
        }
      });
    }

    function checkAllAnswers() {
      let score = 0;
      const resultBox = document.getElementById('resultBox');
      const submitBtn = document.getElementById('submitBtn');
      const retryBtn = document.getElementById('retryBtn');
      
      quizzes.forEach((quiz, index) => {
        const options = document.querySelectorAll('.quiz-item')[index].querySelectorAll('.quiz-option');
        options.forEach((opt, i) => {
          opt.classList.remove('correct', 'wrong');
          if (i === quiz.correct) {
            opt.classList.add('correct');
          } else if (selectedAnswers[index] === i && i !== quiz.correct) {
            opt.classList.add('wrong');
          }
        });
        
        if (selectedAnswers[index] === quiz.correct) {
          score++;
        }
      });

      resultBox.textContent = `你既得分: ${score} / ${quizzes.length}`;
      resultBox.className = 'result-box show';
      if (score === quizzes.length) {
        resultBox.classList.add('success');
      } else {
        resultBox.classList.add('fail');
      }

      submitBtn.style.display = 'none';
      retryBtn.style.display = 'inline-block';
    }

    function resetQuiz() {
      selectedAnswers = {};
      const resultBox = document.getElementById('resultBox');
      const submitBtn = document.getElementById('submitBtn');
      const retryBtn = document.getElementById('retryBtn');

      resultBox.className = 'result-box';
      resultBox.textContent = '';
      submitBtn.style.display = 'inline-block';
      retryBtn.style.display = 'none';

      document.querySelectorAll('.quiz-option').forEach(opt => {
        opt.classList.remove('selected', 'correct', 'wrong');
      });
    }

    initQuiz();
  </script>
</body>
</html>
