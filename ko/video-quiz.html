<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Video Quiz - 공부를하자</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Inter', 'Noto Sans KR', sans-serif;
      background: #f9f9fc;
      color: #333;
      line-height: 1.6;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 30px;
    }

    nav {
      position: fixed;
      top: 0;
      width: 100%;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(192, 132, 252, 0.15);
      z-index: 1000;
      padding: 18px 0;
    }
    .nav-container {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .logo {
      font-size: 1.8rem;
      font-weight: 700;
      color: #c084fc;
      text-decoration: none;
    }
    .nav-links {
      display: flex;
      gap: 40px;
    }
    .nav-links a {
      color: #4b2e5a;
      text-decoration: none;
      font-weight: 500;
      transition: color 0.3s;
    }
    .nav-links a:hover, .nav-links a.active {
      color: #c084fc;
    }

    main {
      padding: 100px 0 80px;
      min-height: 100vh;
    }

    .page-header {
      background: linear-gradient(135deg, #2d1f4e 0%, #1a1625 100%);
      padding: 60px 0;
      text-align: center;
    }
    .page-header h1 {
      font-size: 2.5rem;
      color: #fff;
      margin-bottom: 10px;
    }
    .page-header p {
      color: rgba(255,255,255,0.7);
      font-size: 1.1rem;
    }

    .content {
      max-width: 1000px;
      margin: 0 auto;
      padding: 40px 30px;
    }

    .video-wrapper {
      position: relative;
      width: 100%;
      aspect-ratio: 16/9;
      background: #000;
      border-radius: 16px;
      overflow: hidden;
      margin-bottom: 30px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    }
    .video-wrapper iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    .quiz-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(26, 22, 37, 0.95);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 100;
    }
    .quiz-overlay.active {
      display: flex;
    }

    .quiz-popup {
      background: linear-gradient(145deg, #2d1f4e, #3d2a5f);
      border-radius: 24px;
      padding: 40px 50px;
      max-width: 500px;
      width: 90%;
      text-align: center;
      box-shadow: 0 25px 80px rgba(0, 0, 0, 0.5);
      border: 1px solid rgba(192, 132, 252, 0.3);
      animation: popIn 0.3s ease;
    }
    @keyframes popIn {
      from { transform: scale(0.8); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    .quiz-question {
      font-size: 1.4rem;
      margin-bottom: 30px;
      line-height: 1.6;
      color: #fff;
    }
    .quiz-options {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }
    .quiz-option {
      background: rgba(255, 255, 255, 0.08);
      border: 2px solid rgba(255, 255, 255, 0.15);
      border-radius: 12px;
      padding: 16px 24px;
      font-size: 1.1rem;
      color: #fff;
      cursor: pointer;
      transition: all 0.2s ease;
      text-align: left;
    }
    .quiz-option:hover {
      background: rgba(192, 132, 252, 0.2);
      border-color: #c084fc;
    }
    .quiz-option.correct {
      background: #22c55e;
      border-color: #22c55e;
    }
    .quiz-option.wrong {
      background: #ef4444;
      border-color: #ef4444;
    }
    .quiz-option.disabled {
      pointer-events: none;
      opacity: 0.6;
    }

    .feedback-msg {
      margin-top: 20px;
      font-size: 1.2rem;
      font-weight: 600;
      min-height: 35px;
    }
    .feedback-msg.correct {
      color: #22c55e;
    }
    .feedback-msg.wrong {
      color: #ef4444;
    }

    .continue-btn {
      margin-top: 25px;
      padding: 14px 40px;
      font-size: 1.1rem;
      font-weight: 600;
      background: #c084fc;
      color: white;
      border: none;
      border-radius: 30px;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .continue-btn:hover {
      background: #a855f7;
      transform: translateY(-2px);
    }

    .progress-container {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      height: 8px;
      margin-bottom: 20px;
      overflow: hidden;
    }
    .progress-bar {
      background: linear-gradient(90deg, #c084fc, #a855f7);
      height: 100%;
      width: 0%;
      transition: width 0.3s ease;
    }

    .quiz-info {
      background: white;
      border-radius: 16px;
      padding: 30px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }
    .quiz-info h2 {
      font-size: 1.8rem;
      margin-bottom: 20px;
      color: #4b2e5a;
    }
    .quiz-timestamps {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .timestamp-item {
      display: flex;
      align-items: center;
      gap: 15px;
      padding: 15px 20px;
      background: #f9f9fc;
      border-radius: 10px;
      font-size: 1rem;
    }
    .timestamp-item.completed {
      background: rgba(34, 197, 94, 0.15);
    }
    .timestamp-item.completed::before {
      content: "✓";
      color: #22c55e;
      font-weight: bold;
    }
    .timestamp {
      background: #c084fc;
      color: white;
      padding: 5px 12px;
      border-radius: 20px;
      font-weight: 600;
      font-size: 0.9rem;
    }
    .status {
      margin-left: auto;
      font-size: 0.9rem;
      opacity: 0.6;
    }

    .score-display {
      background: rgba(192, 132, 252, 0.2);
      padding: 10px 24px;
      border-radius: 30px;
      font-weight: 600;
      color: #c084fc;
    }

    .results-modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(26, 22, 37, 0.98);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 200;
    }
    .results-modal.active {
      display: flex;
    }
    .results-content {
      text-align: center;
      max-width: 500px;
      padding: 50px;
    }
    .results-content h2 {
      font-size: 3rem;
      margin-bottom: 20px;
      color: #c084fc;
    }
    .final-score {
      font-size: 5rem;
      font-weight: 700;
      margin: 30px 0;
      background: linear-gradient(135deg, #c084fc, #a855f7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .results-content p {
      font-size: 1.3rem;
      opacity: 0.8;
      margin-bottom: 40px;
      color: #fff;
    }
    .restart-btn {
      padding: 16px 50px;
      font-size: 1.2rem;
      font-weight: 600;
      background: #c084fc;
      color: white;
      border: none;
      border-radius: 30px;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .restart-btn:hover {
      background: #a855f7;
      transform: translateY(-2px);
    }

    .video-controls {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 20px;
      background: linear-gradient(transparent, rgba(0,0,0,0.8));
      display: flex;
      gap: 15px;
      align-items: center;
    }
    .control-btn {
      background: rgba(255, 255, 255, 0.2);
      border: none;
      color: white;
      padding: 10px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1rem;
      transition: background 0.2s;
    }
    .control-btn:hover {
      background: rgba(255, 255, 255, 0.3);
    }
    .time-display {
      margin-left: auto;
      font-weight: 500;
    }

    @media (max-width: 768px) {
      .nav-links { gap: 24px; font-size: 0.95rem; }
      .page-header h1 { font-size: 2rem; }
    }
  </style>
</head>
<body>

  <nav>
    <div class="container nav-container">
      <a href="index.html" class="logo">공부하자 💕</a>
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="vocab.html">Vocabulary</a>
        <a href="Chatbot.html">Chatbot</a>
        <a href="video-quiz.html" class="active">Video Quiz</a>
        <a href="Resource.html">Resources</a>
        <a href="stats.html">Statistics</a>
        <a href="Contact.html">Contact</a>
      </div>
      <div class="score-display">得分: <span id="score">0</span> / <span id="total">4</span></div>
    </div>
  </nav>

  <main>
    <div class="page-header">
      <div class="container">
        <h1>🎬 影片問答挑戰</h1>
        <p>一邊睇片一邊學韓文</p>
      </div>
    </div>

    <div class="content">
      <div class="progress-container">
        <div class="progress-bar" id="progressBar"></div>
      </div>

      <div class="video-wrapper">
        <iframe id="videoFrame" src="https://www.youtube.com/embed/0LvD3u7z-pk?enablejsapi=1" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
        
        <div class="quiz-overlay" id="quizOverlay">
          <div class="quiz-popup">
            <div class="quiz-question" id="quizQuestion"></div>
            <div class="quiz-options" id="quizOptions"></div>
            <div class="feedback-msg" id="feedbackMsg"></div>
            <button class="continue-btn" id="continueBtn" style="display:none;" onclick="resumeVideo()">繼續 ▶</button>
          </div>
        </div>
      </div>

      <div class="quiz-info">
        <h2>📝 問答時間表</h2>
        <div class="quiz-timestamps" id="quizTimestamps"></div>
      </div>
    </div>
  </main>

  <div class="results-modal" id="resultsModal">
    <div class="results-content">
      <h2>🎉 測驗完成！</h2>
      <div class="final-score" id="finalScore">0/4</div>
      <p id="resultMessage">表現不錯！繼續努力！</p>
      <button class="restart-btn" onclick="restartQuiz()">重新開始</button>
    </div>
  </div>

  <script src="https://www.youtube.com/iframe_api"></script>
  <script>
    const quizzes = [
      { timestamp: 15, question: "這部韓劇叫什麼？", options: ["藍色大海的傳說", "來自星星的你", "永恆的君主", "太陽的後裔"], correct: 0 },
      { timestamp: 30, question: "男主角是誰？", options: ["李敏鎬", "朴敘俊", "金賢重", "宋仲基"], correct: 0 },
      { timestamp: 45, question: "全智賢扮演什麼角色？", options: ["美人魚", "公主", "醫生", "檢探"], correct: 0 },
      { timestamp: 60, question: "這部劇是幾年播出的？", options: ["2014", "2015", "2016", "2017"], correct: 2 }
    ];

    let player;
    let currentQuizIndex = 0;
    let score = 0;
    let answeredQuestions = new Set();
    let videoPausedForQuiz = false;

    function initQuizList() {
      const container = document.getElementById('quizTimestamps');
      quizzes.forEach((quiz, index) => {
        const item = document.createElement('div');
        item.className = 'timestamp-item';
        item.id = `quiz-${index}`;
        item.innerHTML = `
          <span class="timestamp">${formatTime(quiz.timestamp)}</span>
          <span class="status">尚未回答</span>
        `;
        container.appendChild(item);
      });
    }

    function formatTime(seconds) {
      const mins = Math.floor(seconds / 60);
      const secs = seconds % 60;
      return `${mins}:${secs.toString().padStart(2, '0')}`;
    }

    function onYouTubeIframeAPIReady() {
      player = new YT.Player('videoFrame', {
        events: {
          'onReady': () => {
            initQuizList();
          }
        }
      });
    }

    setInterval(() => {
      if (player && player.getPlayerState() === 1 && currentQuizIndex < quizzes.length) {
        const t = player.getCurrentTime();
        const q = quizzes[currentQuizIndex];
        if (t >= q.timestamp && !answeredQuestions.has(currentQuizIndex)) {
          showQuiz();
        }
      }
    }, 500);

    function showQuiz() {
      if (currentQuizIndex >= quizzes.length) {
        showResults();
        return;
      }

      const quiz = quizzes[currentQuizIndex];
      player.pauseVideo();
      videoPausedForQuiz = true;

      document.getElementById('quizQuestion').textContent = quiz.question;
      document.getElementById('quizOptions').innerHTML = '';
      document.getElementById('feedbackMsg').textContent = '';
      document.getElementById('feedbackMsg').className = 'feedback-msg';
      document.getElementById('continueBtn').style.display = 'none';

      quiz.options.forEach((option, index) => {
        const btn = document.createElement('button');
        btn.className = 'quiz-option';
        btn.textContent = option;
        btn.onclick = () => checkAnswer(index);
        document.getElementById('quizOptions').appendChild(btn);
      });

      document.getElementById('quizOverlay').classList.add('active');
    }

    function checkAnswer(selectedIndex) {
      if (answeredQuestions.has(currentQuizIndex)) return;

      const quiz = quizzes[currentQuizIndex];
      const options = document.querySelectorAll('.quiz-option');
      answeredQuestions.add(currentQuizIndex);

      options.forEach(opt => opt.classList.add('disabled'));

      if (selectedIndex === quiz.correct) {
        options[selectedIndex].classList.add('correct');
        document.getElementById('feedbackMsg').textContent = '✅ 正確！';
        document.getElementById('feedbackMsg').className = 'feedback-msg correct';
        score++;
        document.getElementById('score').textContent = score;
      } else {
        options[selectedIndex].classList.add('wrong');
        options[quiz.correct].classList.add('correct');
        document.getElementById('feedbackMsg').textContent = '❌ 錯誤！正確答案是: ' + quiz.options[quiz.correct];
        document.getElementById('feedbackMsg').className = 'feedback-msg wrong';
      }

      document.getElementById(`quiz-${currentQuizIndex}`).classList.add('completed');
      document.getElementById(`quiz-${currentQuizIndex}`).querySelector('.status').textContent = '已完成';

      document.getElementById('continueBtn').style.display = 'inline-block';
      currentQuizIndex++;
    }

    function resumeVideo() {
      document.getElementById('quizOverlay').classList.remove('active');
      player.playVideo();
      videoPausedForQuiz = false;
    }

    function showResults() {
      document.getElementById('finalScore').textContent = `${score}/${quizzes.length}`;
      
      let message = '';
      if (score === quizzes.length) {
        message = '🎯 完美！全對！你是天才！';
      } else if (score >= quizzes.length * 0.7) {
        message = '🌟 做得很好！繼續保持！';
      } else if (score >= quizzes.length * 0.4) {
        message = '💪 不錯哦！再加油！';
      } else {
        message = '📚 再多看幾遍，你會做得更好！';
      }
      document.getElementById('resultMessage').textContent = message;
      
      document.getElementById('resultsModal').classList.add('active');
    }

    function restartQuiz() {
      player.seekTo(0);
      player.playVideo();
      currentQuizIndex = 0;
      score = 0;
      answeredQuestions.clear();
      document.getElementById('score').textContent = '0';
      document.getElementById('resultsModal').classList.remove('active');
      document.getElementById('quizOverlay').classList.remove('active');
      
      document.querySelectorAll('.timestamp-item').forEach(item => {
        item.classList.remove('completed');
        item.querySelector('.status').textContent = '尚未回答';
      });
    }
  </script>
</body>
</html>
