<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Chatbot - 공부를하자</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Inter', 'Noto Sans KR', sans-serif;
      background: #f9f9fc;
      color: #333;
      line-height: 1.6;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 30px;
    }

    nav {
      position: fixed;
      top: 0;
      width: 100%;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(192, 132, 252, 0.15);
      z-index: 1000;
      padding: 18px 0;
    }
    .nav-container {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .logo {
      font-size: 1.8rem;
      font-weight: 700;
      color: #c084fc;
      text-decoration: none;
    }
    .nav-links {
      display: flex;
      gap: 40px;
    }
    .nav-links a {
      color: #4b2e5a;
      text-decoration: none;
      font-weight: 500;
      transition: color 0.3s;
    }
    .nav-links a:hover, .nav-links a.active {
      color: #c084fc;
    }

    main {
      padding: 140px 0 80px;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    .chatbot-container {
      width: 100%;
      max-width: 480px;
      background: #ffffff;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1);
      display: flex;
      flex-direction: column;
      height: 75vh;
      max-height: 700px;
    }

    .chatbot-header {
      background: linear-gradient(135deg, #c084fc 0%, #a855f7 100%);
      padding: 24px;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .chatbot-avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
    }

    .chatbot-title {
      color: white;
      font-size: 1.2rem;
      font-weight: 600;
    }

    .chatbot-status {
      color: rgba(255, 255, 255, 0.85);
      font-size: 0.85rem;
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      background: #fafafa;
    }

    .message {
      max-width: 82%;
      padding: 14px 18px;
      border-radius: 20px;
      font-size: 0.95rem;
      line-height: 1.5;
      animation: slideIn 0.3s ease;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .message.bot {
      background: #f3e8ff;
      color: #4b2e5a;
      border-bottom-left-radius: 6px;
      align-self: flex-start;
    }

    .message.user {
      background: linear-gradient(135deg, #c084fc 0%, #a855f7 100%);
      color: white;
      border-bottom-right-radius: 6px;
      align-self: flex-end;
    }

    .typing-indicator {
      display: flex;
      gap: 5px;
      padding: 14px 18px;
      background: #f3e8ff;
      border-radius: 20px;
      border-bottom-left-radius: 6px;
      width: fit-content;
      animation: slideIn 0.3s ease;
    }

    .typing-indicator span {
      width: 9px;
      height: 9px;
      background: #c084fc;
      border-radius: 50%;
      animation: bounce 1.4s infinite ease-in-out;
    }

    .typing-indicator span:nth-child(1) { animation-delay: 0s; }
    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40% { transform: translateY(-8px); }
    }

    .quick-replies {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      padding: 0 24px 18px;
      background: #fafafa;
    }

    .quick-reply-btn {
      background: white;
      color: #a855f7;
      border: 1.5px solid #c084fc;
      padding: 10px 18px;
      border-radius: 24px;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.25s ease;
    }

    .quick-reply-btn:hover {
      background: #c084fc;
      color: white;
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(192, 132, 252, 0.3);
    }

    .chat-input-area {
      padding: 18px 24px;
      background: white;
      display: flex;
      gap: 14px;
      border-top: 1px solid #eee;
    }

    .chat-input {
      flex: 1;
      background: #f5f5f5;
      border: none;
      padding: 14px 18px;
      border-radius: 28px;
      color: #333;
      font-size: 0.95rem;
      font-family: inherit;
      outline: none;
      transition: background 0.3s;
    }

    .chat-input:focus {
      background: #f0f0f0;
    }

    .chat-input::placeholder {
      color: #999;
    }

    .send-btn {
      background: linear-gradient(135deg, #c084fc 0%, #a855f7 100%);
      border: none;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      color: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      box-shadow: 0 4px 12px rgba(192, 132, 252, 0.3);
    }

    .send-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 6px 16px rgba(168, 85, 247, 0.4);
    }

    .send-btn svg {
      width: 20px;
      height: 20px;
    }

    footer {
      padding: 40px 0;
      text-align: center;
      color: #888;
    }
    footer .accent {
      color: #c084fc;
    }

    @media (max-width: 768px) {
      .nav-links { gap: 20px; font-size: 0.9rem; }
      .chatbot-container {
        border-radius: 0;
        height: 100vh;
        max-height: 100vh;
      }
    }
  </style>
</head>
<body>

  <nav>
    <div class="container nav-container">
      <a href="index.html" class="logo">공부하자 💕</a>
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="vocab.html">Vocabulary</a>
        <a href="Chatbot.html" class="active">Chatbot</a>
        <a href="Resource.html">Resources</a>
        <a href="stats.html">Statistics</a>
      </div>
    </div>
  </nav>

  <main>
    <div class="chatbot-container">
      <div class="chatbot-header">
        <div class="chatbot-avatar">🤖</div>
        <div>
          <div class="chatbot-title">AI 챗봇</div>
          <div class="chatbot-status">온라인</div>
        </div>
      </div>
      
      <div class="chat-messages" id="messages">
        <div class="message bot">안녕하세요! 👋 무엇을 도와드릴까요?</div>
      </div>

      <div class="quick-replies" id="quickReplies">
        <button class="quick-reply-btn" onclick="sendQuickReply('무엇을 할 수 있어?')">무엇을 할 수 있어?</button>
        <button class="quick-reply-btn" onclick="sendQuickReply('한국어 연습하고 싶어')">한국어 연습</button>
        <button class="quick-reply-btn" onclick="sendQuickReply('다른 사람과 대화하고 싶어')">담당자 연결</button>
      </div>

      <div class="chat-input-area">
        <input type="text" class="chat-input" id="chatInput" placeholder="메시지를 입력하세요..." onkeypress="handleKeyPress(event)">
        <button class="send-btn" onclick="sendMessage()">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/>
          </svg>
        </button>
      </div>
    </div>
  </main>

  <footer>
    <div class="container">
      <p>讓學習韓文變成最甜的日常 • <span class="accent">공부하자</span> ♥ • 香港 K-learners • 2026</p>
    </div>
  </footer>

  <script>
    const messagesContainer = document.getElementById('messages');
    const chatInput = document.getElementById('chatInput');
    const quickRepliesContainer = document.getElementById('quickReplies');

    const botResponses = {
      '무엇을 할 수 있어': '저는 한국어 친구가 되어드릴 수 있어요! 대화를 통해 한국어를 연습하고, 궁금한 것을 알려드릴 수 있습니다. 무엇을 배우고 싶으세요?',
      '한국어 연습': '좋아요! 한국어로 대화해봐요. 어려운 단어가 있으면 알려줄게요. 무슨 이야기를 하고 싶어요?',
      '다른 사람과 대화하고 싶어': '네, 담당자에게 연결해드릴게요. 지금 바로 연결할까요?',
      'default': '메시지 감사합니다! 다른 도움이 필요하시면 말씀해 주세요 😊'
    };

    function handleKeyPress(event) {
      if (event.key === 'Enter') {
        sendMessage();
      }
    }

    function sendQuickReply(text) {
      addMessage(text, 'user');
      chatInput.value = '';
      simulateTyping();
    }

    function sendMessage() {
      const text = chatInput.value.trim();
      if (!text) return;
      
      addMessage(text, 'user');
      chatInput.value = '';
      simulateTyping();
    }

    function addMessage(text, sender) {
      const messageDiv = document.createElement('div');
      messageDiv.className = `message ${sender}`;
      messageDiv.textContent = text;
      messagesContainer.appendChild(messageDiv);
      scrollToBottom();
    }

    function simulateTyping() {
      const typingDiv = document.createElement('div');
      typingDiv.className = 'typing-indicator';
      typingDiv.innerHTML = '<span></span><span></span><span></span>';
      typingDiv.id = 'typingIndicator';
      messagesContainer.appendChild(typingDiv);
      scrollToBottom();

      setTimeout(() => {
        typingDiv.remove();
        getBotResponse();
      }, 1500);
    }

    function getBotResponse() {
      const lastUserMessage = messagesContainer.querySelectorAll('.message.user');
      const lastText = lastUserMessage[lastUserMessage.length - 1]?.textContent || '';
      
      let response = botResponses['default'];
      for (const key in botResponses) {
        if (lastText.includes(key) && key !== 'default') {
          response = botResponses[key];
          break;
        }
      }

      addMessage(response, 'bot');
      updateQuickReplies();
    }

    function updateQuickReplies() {
      quickRepliesContainer.innerHTML = '';
      const quickReplyOptions = [
        '더 알아볼래',
          '감사해요!',
          '다른 질문이 있어'
      ];
      
      quickReplyOptions.forEach(option => {
        const btn = document.createElement('button');
        btn.className = 'quick-reply-btn';
        btn.textContent = option;
        btn.onclick = () => sendQuickReply(option);
        quickRepliesContainer.appendChild(btn);
      });
    }

    function scrollToBottom() {
      messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }
  </script>

</body>
</html>
