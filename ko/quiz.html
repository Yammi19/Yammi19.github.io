<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>퀴즈 - Korean Quiz</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Inter', 'Noto Sans KR', sans-serif;
      background: #ffffff;
      color: #333333;
      line-height: 1.6;
      min-height: 100vh;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 30px;
    }

    nav {
      position: fixed;
      top: 0;
      width: 100%;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(192, 132, 252, 0.15);
      z-index: 1000;
      padding: 18px 0;
    }
    .nav-container {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .logo {
      font-size: 1.8rem;
      font-weight: 700;
      color: #c084fc;
      text-decoration: none;
    }
    .nav-links {
      display: flex;
      gap: 40px;
    }
    .nav-links a {
      color: #4b2e5a;
      text-decoration: none;
      font-weight: 500;
      transition: color 0.3s;
    }
    .nav-links a:hover, .nav-links a.active {
      color: #c084fc;
    }

    .quiz-container {
      padding: 160px 0 80px;
      max-width: 700px;
      margin: 0 auto;
      text-align: center;
    }

    .quiz-header {
      margin-bottom: 40px;
    }

    .progress-container {
      background: #e5e7eb;
      border-radius: 50px;
      height: 12px;
      margin-bottom: 30px;
      overflow: hidden;
    }
    .progress-bar {
      background: linear-gradient(90deg, #c084fc, #a855f7);
      height: 100%;
      border-radius: 50px;
      transition: width 0.5s ease;
      width: 10%;
    }

    .timer {
      font-size: 1.5rem;
      font-weight: 600;
      color: #4b2e5a;
      margin-bottom: 20px;
    }
    .timer.warning {
      color: #f59e0b;
    }
    .timer.danger {
      color: #ef4444;
      animation: pulse 0.5s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .question-counter {
      color: #888;
      font-size: 1rem;
      margin-bottom: 10px;
    }

    .question {
      font-size: 2.2rem;
      font-weight: 600;
      color: #4b2e5a;
      margin-bottom: 40px;
    }

    .question .korean {
      font-size: 2.8rem;
      display: block;
      margin-bottom: 10px;
    }

    .options {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .option {
      padding: 20px 30px;
      background: white;
      border: 2px solid #e5e7eb;
      border-radius: 16px;
      font-size: 1.2rem;
      cursor: pointer;
      transition: all 0.3s ease;
      text-align: left;
    }
    .option:hover:not(.correct):not(.wrong):not(.disabled) {
      border-color: #c084fc;
      background: #fdf5ff;
    }

    .option.correct {
      border-color: #22c55e;
      background: #dcfce7;
      color: #166534;
    }
    .option.wrong {
      border-color: #ef4444;
      background: #fee2e2;
      color: #991b1b;
    }
    .option.disabled {
      cursor: default;
      opacity: 0.6;
    }

    .feedback {
      margin-top: 30px;
      padding: 20px;
      border-radius: 12px;
      font-size: 1.1rem;
      display: none;
    }
    .feedback.show {
      display: block;
    }
    .feedback.correct {
      background: #dcfce7;
      color: #166534;
    }
    .feedback.wrong {
      background: #fee2e2;
      color: #991b1b;
    }

    .next-btn {
      margin-top: 30px;
      padding: 16px 48px;
      font-size: 1.2rem;
      font-weight: 600;
      background: #c084fc;
      color: white;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 8px 25px rgba(192,132,252,0.25);
      display: none;
    }
    .next-btn.show {
      display: inline-block;
    }
    .next-btn:hover {
      background: #a855f7;
      transform: translateY(-2px);
    }

    .results {
      display: none;
      text-align: center;
    }
    .results.show {
      display: block;
    }
    .results h2 {
      font-size: 2.5rem;
      color: #4b2e5a;
      margin-bottom: 20px;
    }
    .results .score {
      font-size: 4rem;
      font-weight: 700;
      color: #c084fc;
      margin-bottom: 20px;
    }
    .results .message {
      font-size: 1.3rem;
      color: #555;
      margin-bottom: 40px;
    }
  </style>
</head>
<body>

  <nav>
    <div class="container nav-container">
      <a href="index.html" class="logo">공부하자 💕</a>
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="vocab.html">Vocabulary</a>
        <a href="quiz.html" class="active">Quiz</a>
        <a href="Resource.html">Resources</a>
        <a href="stats.html">Statistics</a>
      </div>
    </div>
  </nav>

  <div class="quiz-container" id="quiz">
    <div class="quiz-header">
      <div class="progress-container">
        <div class="progress-bar" id="progressBar"></div>
      </div>
      <div class="timer" id="timer">시간: 30초</div>
      <div class="question-counter">문제 <span id="currentQ">1</span> / <span id="totalQ">10</span></div>
    </div>

    <div class="question" id="question">
      <span class="korean" id="koreanWord"></span>
      <span id="meaning"></span>
    </div>

    <div class="options" id="options"></div>

    <div class="feedback" id="feedback"></div>
    <button class="next-btn" id="nextBtn">다음 문제</button>
  </div>

  <div class="quiz-container results" id="results">
    <h2>퀴즈 완료!</h2>
    <div class="score" id="scoreDisplay">0/10</div>
    <div class="message" id="resultMessage"></div>
    <a href="quiz.html" class="cta-btn" style="display:inline-block;padding:16px 48px;font-size:1.3rem;font-weight:600;background:#c084fc;color:white;border-radius:50px;text-decoration:none;transition:all 0.3s ease;box-shadow:0 8px 25px rgba(192,132,252,0.25);">다시 하기</a>
    <a href="index.html" class="cta-btn secondary-btn" style="display:inline-block;padding:16px 48px;font-size:1.3rem;font-weight:600;background:transparent;border:2px solid #c084fc;color:#c084fc;border-radius:50px;text-decoration:none;margin-left:20px;">첫 페이지</a>
  </div>

  <script>
    const quizData = [
      { word: "안녕하세요", meaning: "Hello", options: ["Hello", "Goodbye", "Thank you", "Sorry"], answer: 0 },
      { word: "감사합니다", meaning: "Thank you", options: ["Hello", "Goodbye", "Thank you", "Sorry"], answer: 2 },
      { word: "再见", meaning: "Goodbye", options: ["Hello", "Goodbye", "Thank you", "Sorry"], answer: 1 },
      { word: "对不起", meaning: "Sorry", options: ["Hello", "Goodbye", "Thank you", "Sorry"], answer: 3 },
      { word: "是", meaning: "Yes", options: ["Yes", "No", "Maybe", "Okay"], answer: 0 },
      { word: "不是", meaning: "No", options: ["Yes", "No", "Maybe", "Okay"], answer: 1 },
      { word: "你好", meaning: "Nice to meet you", options: ["Nice to meet you", "Good morning", "Good night", "See you"], answer: 0 },
      { word: "早上好", meaning: "Good morning", options: ["Nice to meet you", "Good morning", "Good night", "See you"], answer: 1 },
      { word: "晚安", meaning: "Good night", options: ["Nice to meet you", "Good morning", "Good night", "See you"], answer: 2 },
      { word: "再见", meaning: "See you", options: ["Nice to meet you", "Good morning", "Good night", "See you"], answer: 3 }
    ];

    let currentQuestion = 0;
    let score = 0;
    let timeLeft = 30;
    let timer;
    let answered = false;

    const progressBar = document.getElementById('progressBar');
    const timerEl = document.getElementById('timer');
    const currentQ = document.getElementById('currentQ');
    const totalQ = document.getElementById('totalQ');
    const koreanWord = document.getElementById('koreanWord');
    const meaning = document.getElementById('meaning');
    const optionsEl = document.getElementById('options');
    const feedback = document.getElementById('feedback');
    const nextBtn = document.getElementById('nextBtn');
    const quiz = document.getElementById('quiz');
    const results = document.getElementById('results');

    totalQ.textContent = quizData.length;

    function loadQuestion() {
      answered = false;
      timeLeft = 30;
      timerEl.classList.remove('warning', 'danger');
      updateTimerDisplay();
      
      const q = quizData[currentQuestion];
      koreanWord.textContent = q.word;
      meaning.textContent = " meaning?";
      
      currentQ.textContent = currentQuestion + 1;
      progressBar.style.width = ((currentQuestion + 1) / quizData.length * 100) + '%';
      
      optionsEl.innerHTML = '';
      q.options.forEach((opt, index) => {
        const btn = document.createElement('button');
        btn.className = 'option';
        btn.textContent = opt;
        btn.onclick = () => selectAnswer(index, btn);
        optionsEl.appendChild(btn);
      });
      
      feedback.classList.remove('show', 'correct', 'wrong');
      nextBtn.classList.remove('show');
      
      startTimer();
    }

    function startTimer() {
      clearInterval(timer);
      timer = setInterval(() => {
        timeLeft--;
        updateTimerDisplay();
        
        if (timeLeft <= 10) {
          timerEl.classList.add('danger');
        } else if (timeLeft <= 20) {
          timerEl.classList.add('warning');
        }
        
        if (timeLeft <= 0) {
          clearInterval(timer);
          selectAnswer(-1);
        }
      }, 1000);
    }

    function updateTimerDisplay() {
      timerEl.textContent = `시간: ${timeLeft}초`;
    }

    function selectAnswer(selectedIndex, btn) {
      if (answered) return;
      answered = true;
      clearInterval(timer);
      
      const q = quizData[currentQuestion];
      const options = document.querySelectorAll('.option');
      
      if (selectedIndex === q.answer) {
        score++;
        feedback.textContent = "정답! 🎉";
        feedback.className = 'feedback show correct';
        if (btn) btn.classList.add('correct');
      } else {
        feedback.textContent = selectedIndex === -1 ? "시간 초과!" : "오답!";
        feedback.className = 'feedback show wrong';
        if (btn) btn.classList.add('wrong');
        if (selectedIndex !== -1) options[selectedIndex].classList.add('wrong');
      }
      
      options[q.answer].classList.add('correct');
      options.forEach(opt => opt.classList.add('disabled'));
      
      nextBtn.classList.add('show');
    }

    nextBtn.onclick = () => {
      currentQuestion++;
      if (currentQuestion < quizData.length) {
        loadQuestion();
      } else {
        showResults();
      }
    };

    function showResults() {
      quiz.style.display = 'none';
      results.classList.add('show');
      document.getElementById('scoreDisplay').textContent = `${score}/${quizData.length}`;
      
      const percentage = score / quizData.length * 100;
      let message = '';
      if (percentage >= 90) message = '대단해요! 🎉五星的水平!';
      else if (percentage >= 70) message = '잘했어요! 😊很不錯!';
      else if (percentage >= 50) message = '좋아요! 💪再加油!';
      else message = '열공하세요! 📚繼續努力!';
      
      document.getElementById('resultMessage').textContent = message;
    }

    loadQuestion();
  </script>
</body>
</html>
