<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daily Match</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Nunito', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      overflow-x: hidden;
    }

    h1 {
      color: white;
      font-size: 2.5rem;
      margin-bottom: 10px;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
      animation: fadeInDown 0.8s ease-out;
    }

    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .score-board {
      display: flex;
      gap: 30px;
      margin-bottom: 20px;
      color: white;
      font-size: 1.2rem;
    }

    .score-board span {
      background: rgba(255,255,255,0.2);
      padding: 8px 20px;
      border-radius: 20px;
      backdrop-filter: blur(5px);
    }

    .game-container {
      display: flex;
      gap: 40px;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 1000px;
    }

    .card-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
    }

    .area-label {
      color: white;
      font-size: 1.1rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .cards {
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-width: 140px;
      padding: 20px;
      background: rgba(255,255,255,0.1);
      border-radius: 16px;
      min-height: 300px;
      border: 2px dashed rgba(255,255,255,0.3);
      transition: all 0.3s ease;
    }

    .cards.drag-over {
      background: rgba(255,255,255,0.25);
      border-color: #ffd700;
      transform: scale(1.02);
    }

    .card {
      width: 120px;
      height: 80px;
      background: white;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      cursor: grab;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      user-select: none;
      position: relative;
    }

    .card:hover {
      transform: translateY(-5px) rotate(2deg);
      box-shadow: 0 8px 25px rgba(0,0,0,0.3);
    }

    .card:active {
      cursor: grabbing;
      transform: scale(1.1) rotate(0deg);
      box-shadow: 0 15px 40px rgba(0,0,0,0.4);
      z-index: 1000;
    }

    .card.dragging {
      opacity: 0.8;
      transform: scale(1.1) rotate(5deg);
    }

    .card.matched {
      animation: matchSuccess 0.6s ease-out forwards;
    }

    @keyframes matchSuccess {
      0% { transform: scale(1); }
      30% { transform: scale(1.2); background: #4ade80; }
      100% { transform: scale(0); opacity: 0; }
    }

    .card.wrong {
      animation: shake 0.5s ease-in-out;
      background: #f87171;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-10px); }
      40% { transform: translateX(10px); }
      60% { transform: translateX(-10px); }
      80% { transform: translateX(10px); }
    }

    .pairs {
      gap: 10px;
    }

    .pair-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .target-slot {
      width: 120px;
      height: 80px;
      background: rgba(255,255,255,0.2);
      border-radius: 12px;
      border: 2px solid rgba(255,255,255,0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
    }

    .target-slot.drag-hover {
      background: rgba(255,215,0,0.3);
      border-color: #ffd700;
      transform: scale(1.05);
    }

    .target-slot.filled {
      background: white;
      border-color: #4ade80;
    }

    .target-slot.filled .slot-label {
      display: none;
    }

    .slot-label {
      color: rgba(255,255,255,0.6);
      font-size: 0.9rem;
    }

    .slot-icon {
      font-size: 1.5rem;
    }

    .restart-btn {
      margin-top: 30px;
      padding: 15px 40px;
      font-size: 1.1rem;
      font-weight: 600;
      background: linear-gradient(135deg, #ffd700, #ff8c00);
      border: none;
      border-radius: 30px;
      color: #333;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 5px 20px rgba(0,0,0,0.3);
    }

    .restart-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 30px rgba(0,0,0,0.4);
    }

    .win-message {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0);
      background: white;
      padding: 40px 60px;
      border-radius: 20px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      z-index: 2000;
      animation: none;
    }

    .win-message.show {
      animation: popIn 0.5s ease-out forwards;
    }

    @keyframes popIn {
      0% { transform: translate(-50%, -50%) scale(0); }
      70% { transform: translate(-50%, -50%) scale(1.1); }
      100% { transform: translate(-50%, -50%) scale(1); }
    }

    .win-message h2 {
      color: #667eea;
      font-size: 2rem;
      margin-bottom: 10px;
    }

    .win-message p {
      color: #666;
      font-size: 1.1rem;
    }

    .confetti {
      position: fixed;
      pointer-events: none;
      z-index: 1999;
    }

    .confetti-piece {
      position: absolute;
      width: 10px;
      height: 10px;
      animation: confettiFall 3s ease-out forwards;
    }

    @keyframes confettiFall {
      0% { transform: translateY(-100vh) rotate(0deg); opacity: 1; }
      100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
    }
  </style>
</head>
<body>
  <h1>Daily Match</h1>
  
  <div class="score-board">
    <span>Moves: <b id="moves">0</b></span>
    <span>Matches: <b id="matches">0</b>/6</span>
  </div>

  <div class="game-container">
    <div class="card-area">
      <div class="area-label">Cards</div>
      <div class="cards" id="cardPool"></div>
    </div>
    
    <div class="card-area">
      <div class="area-label">Match Pairs</div>
      <div class="cards pairs" id="targetArea"></div>
    </div>
  </div>

  <button class="restart-btn" onclick="initGame()">Play Again</button>

  <div class="win-message" id="winMessage">
    <h2>🎉 You Won!</h2>
    <p>Great job matching all pairs!</p>
  </div>

  <div class="confetti" id="confetti"></div>

  <script>
    const dailyItems = [
      { icon: '☀️', name: 'sun' },
      { icon: '🛏️', name: 'bed' },
      { icon: '🍳', name: 'breakfast' },
      { icon: '🚌', name: 'bus' },
      { icon: '📚', name: 'school' },
      { icon: '🌙', name: 'moon' }
    ];

    let moves = 0;
    let matches = 0;
    let draggedCard = null;
    let sourceSlot = null;

    function shuffle(array) {
      const arr = [...array];
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function initGame() {
      moves = 0;
      matches = 0;
      document.getElementById('moves').textContent = '0';
      document.getElementById('matches').textContent = '0/6';
      document.getElementById('winMessage').classList.remove('show');
      document.getElementById('confetti').innerHTML = '';
      
      const cardPool = document.getElementById('cardPool');
      const targetArea = document.getElementById('targetArea');
      
      cardPool.innerHTML = '';
      targetArea.innerHTML = '';
      
      const shuffledCards = shuffle([...dailyItems, ...dailyItems]);
      
      shuffledCards.forEach((item, index) => {
        const card = createCard(item, index);
        cardPool.appendChild(card);
      });
      
      dailyItems.forEach((item, index) => {
        const pairGroup = document.createElement('div');
        pairGroup.className = 'pair-group';
        pairGroup.innerHTML = `
          <div class="target-slot" data-name="${item.name}">
            <span class="slot-label">Drop ${item.icon}</span>
            <span class="slot-icon" style="display:none">${item.icon}</span>
          </div>
        `;
        targetArea.appendChild(pairGroup);
      });

      setupDropZones();
    }

    function createCard(item, index) {
      const card = document.createElement('div');
      card.className = 'card';
      card.draggable = true;
      card.textContent = item.icon;
      card.dataset.name = item.name;
      card.dataset.index = index;
      
      card.addEventListener('dragstart', handleDragStart);
      card.addEventListener('dragend', handleDragEnd);
      
      return card;
    }

    function handleDragStart(e) {
      draggedCard = e.target;
      sourceSlot = e.target.parentElement;
      e.target.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', e.target.dataset.name);
      
      setTimeout(() => {
        e.target.style.opacity = '0.5';
      }, 0);
    }

    function handleDragEnd(e) {
      e.target.classList.remove('dragging');
      e.target.style.opacity = '1';
      
      document.querySelectorAll('.target-slot').forEach(slot => {
        slot.classList.remove('drag-hover');
      });
      document.querySelectorAll('.cards').forEach(cards => {
        cards.classList.remove('drag-over');
      });
    }

    function setupDropZones() {
      const slots = document.querySelectorAll('.target-slot');
      
      slots.forEach(slot => {
        slot.addEventListener('dragover', handleDragOver);
        slot.addEventListener('dragleave', handleDragLeave);
        slot.addEventListener('drop', handleDrop);
      });

      const cardPool = document.getElementById('cardPool');
      cardPool.addEventListener('dragover', (e) => {
        e.preventDefault();
        cardPool.classList.add('drag-over');
      });
      cardPool.addEventListener('dragleave', () => {
        cardPool.classList.remove('drag-over');
      });
      cardPool.addEventListener('drop', handleReturnToPool);
    }

    function handleDragOver(e) {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      e.currentTarget.classList.add('drag-hover');
    }

    function handleDragLeave(e) {
      e.currentTarget.classList.remove('drag-hover');
    }

    function handleDrop(e) {
      e.preventDefault();
      e.currentTarget.classList.remove('drag-hover');
      
      if (!draggedCard) return;
      
      const cardName = draggedCard.dataset.name;
      const slotName = e.currentTarget.dataset.name;
      
      if (e.currentTarget.classList.contains('filled')) {
        return;
      }
      
      if (cardName === slotName) {
        handleMatch(e.currentTarget);
      } else {
        handleMismatch(e.currentTarget);
      }
      
      moves++;
      document.getElementById('moves').textContent = moves;
    }

    function handleMatch(slot) {
      const icon = slot.querySelector('.slot-icon');
      icon.style.display = 'block';
      slot.querySelector('.slot-label').style.display = 'none';
      
      draggedCard.classList.add('matched');
      slot.classList.add('filled');
      
      setTimeout(() => {
        if (draggedCard && draggedCard.parentElement) {
          draggedCard.remove();
        }
      }, 600);
      
      matches++;
      document.getElementById('matches').textContent = `${matches}/6`;
      
      if (matches === 6) {
        setTimeout(showWin, 800);
      }
    }

    function handleMismatch(slot) {
      draggedCard.classList.add('wrong');
      slot.style.borderColor = '#f87171';
      
      setTimeout(() => {
        draggedCard.classList.remove('wrong');
        slot.style.borderColor = '';
      }, 500);
    }

    function handleReturnToPool(e) {
      e.preventDefault();
      e.currentTarget.classList.remove('drag-over');
      
      if (draggedCard && sourceSlot !== e.currentTarget) {
        e.currentTarget.appendChild(draggedCard);
      }
    }

    function showWin() {
      document.getElementById('winMessage').classList.add('show');
      createConfetti();
    }

    function createConfetti() {
      const confettiContainer = document.getElementById('confetti');
      const colors = ['#ff6b6b', '#ffd700', '#4ade80', '#60a5fa', '#a78bfa', '#f472b6'];
      
      for (let i = 0; i < 50; i++) {
        const piece = document.createElement('div');
        piece.className = 'confetti-piece';
        piece.style.left = Math.random() * 100 + 'vw';
        piece.style.background = colors[Math.floor(Math.random() * colors.length)];
        piece.style.animationDelay = Math.random() * 2 + 's';
        piece.style.animationDuration = (Math.random() * 2 + 2) + 's';
        confettiContainer.appendChild(piece);
      }
    }

    initGame();
  </script>
</body>
</html>
