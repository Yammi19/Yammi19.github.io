<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-Drama Video Quiz</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .quiz-container {
            max-width: 900px;
            width: 100%;
            background: #0f0f23;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }
        .video-wrapper { position: relative; width: 100%; background: #000; }
        .video-wrapper iframe { width: 100%; height: 400px; border: none; }
        .popup-overlay {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        .popup-overlay.active { display: flex; }
        .question-popup {
            background: linear-gradient(145deg, #1e1e3f, #252550);
            padding: 40px; border-radius: 20px;
            max-width: 500px; width: 90%;
            text-align: center;
        }
        .question-popup h2 { color: #fff; margin-bottom: 25px; }
        .options { display: flex; flex-direction: column; gap: 12px; }
        .option {
            background: #2a2a5a; border: 2px solid #3d3d7a;
            color: #fff; padding: 15px; border-radius: 12px;
            cursor: pointer; font-size: 1rem;
        }
        .option:hover { background: #3d3d7a; }
        .option.correct { background: #10b981; border-color: #10b981; }
        .option.wrong { background: #ef4444; border-color: #ef4444; }
        .option.disabled { pointer-events: none; }
        .feedback { margin-top: 20px; padding: 15px; border-radius: 10px; display: none; }
        .feedback.correct { background: rgba(16,185,129,0.2); color: #10b981; display: block; }
        .feedback.wrong { background: rgba(239,68,68,0.2); color: #ef4444; display: block; }
        .continue-btn {
            margin-top: 20px; background: linear-gradient(135deg, #ff6b6b, #ff8e8e);
            color: #fff; border: none; padding: 12px 30px;
            border-radius: 10px; font-size: 1rem; cursor: pointer;
            display: none;
        }
        .continue-btn.show { display: inline-block; }
        .score-display { padding: 20px; background: #1e1e3f; color: #fff; text-align: center; }
        .video-controls { padding: 15px; background: #0f0f23; display: flex; justify-content: space-between; }
        .video-controls button {
            background: linear-gradient(135deg, #ff6b6b, #ff8e8e);
            color: #fff; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="quiz-container">
        <div class="video-wrapper">
            <iframe id="videoFrame" src="https://www.youtube.com/embed/0LvD3u7z-pk?enablejsapi=1" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
            <div class="popup-overlay" id="popupOverlay">
                <div class="question-popup">
                    <h2 id="questionText"></h2>
                    <div class="options" id="optionsContainer"></div>
                    <div class="feedback" id="feedback"></div>
                    <button class="continue-btn" id="continueBtn">Continue Video</button>
                </div>
            </div>
        </div>
        <div class="score-display">Score: <span id="score">0</span> / <span id="totalQuestions">0</span></div>
        <div class="video-controls">
            <button onclick="restartQuiz()">Restart Quiz</button>
            <span>Click play to start!</span>
        </div>
    </div>
    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        let player;
        const questions = [
            { timestamp: 15, question: "What is this K-drama called?", options: ["The Legend of the Blue Sea", "My Love from the Star", "The King: Eternal Monarch", "Descendants of the Sun"], correct: 0 },
            { timestamp: 30, question: "Who is the male lead actor?", options: ["Lee Min Ho", "Park Seo Joon", "Kim Hyun Joong", "Song Joong Ki"], correct: 0 },
            { timestamp: 45, question: "What character does Jun Ji Hyun play?", options: ["Mermaid", "Princess", "Doctor", "Detective"], correct: 0 },
            { timestamp: 60, question: "In which year was this aired?", options: ["2014", "2015", "2016", "2017"], correct: 2 }
        ];
        let currentQuestion = 0, score = 0, answeredQuestions = new Set();
        document.getElementById('totalQuestions').textContent = questions.length;

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('videoFrame', { events: { 'onReady': () => console.log('Ready') } });
        }

        setInterval(() => {
            if (player && player.getPlayerState() === 1 && currentQuestion < questions.length) {
                const t = player.getCurrentTime();
                const q = questions[currentQuestion];
                if (t >= q.timestamp && !answeredQuestions.has(currentQuestion)) {
                    showQuestion(currentQuestion);
                }
            }
        }, 500);

        function showQuestion(i) {
            const q = questions[i];
            player.pauseVideo();
            document.getElementById('questionText').textContent = q.question;
            document.getElementById('optionsContainer').innerHTML = '';
            document.getElementById('feedback').className = 'feedback';
            document.getElementById('continueBtn').classList.remove('show');
            q.options.forEach((opt, j) => {
                const btn = document.createElement('button');
                btn.className = 'option';
                btn.textContent = opt;
                btn.onclick = () => selectAnswer(j, q.correct, btn);
                document.getElementById('optionsContainer').appendChild(btn);
            });
            document.getElementById('popupOverlay').classList.add('active');
        }

        function selectAnswer(selected, correct, btn) {
            const opts = document.querySelectorAll('.option');
            opts.forEach(o => o.classList.add('disabled'));
            if (selected === correct) {
                btn.classList.add('correct');
                document.getElementById('feedback').textContent = 'Correct!';
                document.getElementById('feedback').className = 'feedback correct';
                score++;
            } else {
                btn.classList.add('wrong');
                opts[correct].classList.add('correct');
                document.getElementById('feedback').textContent = 'Wrong!';
                document.getElementById('feedback').className = 'feedback wrong';
            }
            document.getElementById('score').textContent = score;
            answeredQuestions.add(currentQuestion);
            currentQuestion++;
            document.getElementById('continueBtn').classList.add('show');
        }

        document.getElementById('continueBtn').onclick = () => {
            document.getElementById('popupOverlay').classList.remove('active');
            player.playVideo();
        };

        function restartQuiz() {
            player.seekTo(0);
            player.playVideo();
            currentQuestion = 0;
            score = 0;
            answeredQuestions.clear();
            document.getElementById('score').textContent = '0';
            document.getElementById('popupOverlay').classList.remove('active');
        }
    </script>
</body>
</html>
